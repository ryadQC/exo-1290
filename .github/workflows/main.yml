name: exo-1290

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  lister-runner:
    name: Lister le répertoire racine du runner
    runs-on: ubuntu-latest

    steps:
      - name: Lister la racine du runner
        run: ls -la /

  docker-build-publish:
    name: Construire et publier l'image Docker
    runs-on: ubuntu-latest
    needs: lister-runner

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v6.0.2

      - name: Lister le contenu du dépôt
        run: |
          pwd
          ls -la

      - name: Connexion à Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Construire l'image Docker
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/python-docker-ex3:latest .

      - name: Vérifier l'image construite
        run: docker images

      - name: Publier l'image sur Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/python-docker-ex3:latest
